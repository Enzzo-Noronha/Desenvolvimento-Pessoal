<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build You</title>
    <link rel="stylesheet" href="src/styles/index.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <header>
      <div></div>
      <div><h2>Build You</h2></div>
      <div></div>
    </header>
    <main>
      <div class="conteudo">
        <section class="section" id="section1">
          <div class="saudacao">
            <h3>O que vamos construir hoje?</h3>
          </div>
        </section>

        <section class="section" id="section2">
          <h3>Lista</h3>
        </section>

        <section class="section" id="section3">
          <h3>Metas</h3>
          <button onclick="AdicionarMeta()" class="criar-meta">
            Criar Meta
          </button>
          <form id="form3">
            <input type="text" placeholder="Digite sua meta" id="meta" />
            <select name="quantidade" id="metaQuantidade">
              <option value="Gramas">Gramas</option>
              <option value="KiloGramas">KiloGramas</option>
              <option value="Litros">Litros</option>
              <option value="MiliLitros">MiliLitros</option>
              <option value="Metros">Metros</option>
              <option value="Kilometros">Kilometros</option>
              <option value="Nenhum">Nenhum</option>
            </select>
            <input
              type="text"
              placeholder="Quantidade"
              id="quantidadeDigitadaMeta"
            />
            <select name="tempo" id="metaTempo">
              <option value="Semanal">Semanal</option>
              <option value="Diário">Diário</option>
              <option value="Mensal">Mensal</option>
              <option value="Anual">Anual</option>
              <option value="Sem tempo">Sem tempo</option>
            </select>
            <button type="submit">Adicionar Meta</button>
            <button type="button" onclick="cancelarMeta()">
              Cancelar Meta
            </button>
          </form>
          <div id="metas"></div>
        </section>

        <section class="section" id="section4">
          <h3>Anotações</h3>
          <form id="form4">
            <input type="text" placeholder="Escreva" id="anotacao" />
            <button type="submit">Salvar Anotação</button>
          </form>
          <div id="anotacoes" class="anotacoes"></div>
        </section>

        <section class="section" id="section5">
          <h3>Perfil</h3>
        </section>
      </div>
      <nav class="menu-inferior">
        <button class="item-menu btn">
          <img
            src="src/img/home_24dp_7C3AED_FILL0_wght400_GRAD0_opsz24.png"
            alt=""
          />
        </button>
        <button class="item-menu btn">
          <img
            src="src/img/list_24dp_7C3AED_FILL0_wght400_GRAD0_opsz24.png"
            alt=""
          />
        </button>
        <button class="item-menu btn">
          <img
            src="src/img/add_24dp_7C3AED_FILL0_wght400_GRAD0_opsz24.png"
            alt=""
          />
        </button>
        <button class="item-menu btn">
          <img
            src="src/img/book_24dp_7C3AED_FILL0_wght400_GRAD0_opsz24 (1).png"
            alt=""
          />
        </button>
        <button class="item-menu btn">
          <img
            src="src/img/person_24dp_7C3AED_FILL0_wght400_GRAD0_opsz24.png"
            alt=""
          />
        </button>
      </nav>
    </main>
    <script src="src/scripts/index.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("pwabuilder-sw.js");
      }
    </script>
  </body>
</html>
